<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerador de Currículo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<h2 class="mb-4 text-center">Gerador de Currículo</h2>

<form action="../api/" method="POST" target="_blank">

<div class="card p-4 mb-4">

<h5>Informações básicas</h5>

<input class="form-control mb-2" name="nome" placeholder="Nome completo">

<input class="form-control mb-2" name="cargo" placeholder="Cargo / profissão">

<input class="form-control mb-2" name="cidade" placeholder="Endereço">

<input class="form-control mb-2" name="telefone" placeholder="Telefone">

<input class="form-control mb-2" name="email" placeholder="Email">

<input class="form-control mb-2" name="linkedin" placeholder="LinkedIn">

<textarea class="form-control" name="resumo" placeholder="Resumo profissional"></textarea>

</div>

<h5>Competências técnicas</h5>

<div id="skills"></div>

<button type="button" class="btn btn-sm btn-secondary mb-3" onclick="addSkill()">Adicionar competência</button>


<h5>Experiência profissional</h5>

<div id="experiencias"></div>

<button type="button" class="btn btn-sm btn-secondary mb-3" onclick="addExp()">Adicionar experiência</button>

<h5>Formação acadêmica</h5>

<div id="formacoes"></div>

<button type="button" class="btn btn-sm btn-secondary mb-3" onclick="addForm()">Adicionar formação</button>

<h5>Cursos / certificações</h5>

<div id="cursos"></div>

<button type="button" class="btn btn-sm btn-secondary mb-3" onclick="addCurso()">Adicionar curso</button>

<br><br>

<button class="btn btn-primary w-100">Gerar currículo</button>

</form>

</div>

<script>

let skillIndex=0
let expIndex=0
let formIndex=0
let cursoIndex=0

function addSkill(){

let html=`
<input class="form-control mb-2" name="skills[]" placeholder="Competência">
`

document.getElementById("skills").insertAdjacentHTML("beforeend",html)

}

function addExp(){

let html=`

<div class="card p-3 mb-2">

<input class="form-control mb-2" name="empresa[]" placeholder="Empresa">

<input class="form-control mb-2" name="cargoexp[]" placeholder="Cargo">

<input class="form-control mb-2" name="periodo[]" placeholder="Período">

</div>

`

document.getElementById("experiencias").insertAdjacentHTML("beforeend",html)

}

function addForm(){

let html=`

<div class="card p-3 mb-2">

<input class="form-control mb-2" name="faculdade[]" placeholder="Instituição">

<input class="form-control mb-2" name="curso[]" placeholder="Curso">

<input class="form-control mb-2" name="periodoform[]" placeholder="Período">

</div>

`

document.getElementById("formacoes").insertAdjacentHTML("beforeend",html)

}

function addCurso(){

let html=`

<input class="form-control mb-2" name="certificados[]" placeholder="Curso ou certificação">

`

document.getElementById("cursos").insertAdjacentHTML("beforeend",html)

}

addSkill()
addExp()
addForm()
addCurso()

</script>

</body>
</html>
