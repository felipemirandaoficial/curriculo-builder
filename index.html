<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gerador de Currículo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:#f4f6f9;
font-size:14px;
}

.section{
background:#fff;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

#resumePreview{
background:white;
padding:30px;
max-width:800px;
margin:auto;
border-radius:6px;
}

.section-title{
border-bottom:2px solid #0d6efd;
margin-top:20px;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container py-4">

<h2 class="text-center mb-4">Gerador de Currículo</h2>

<div class="row">

<!-- FORM -->

<div class="col-lg-6">

<div class="section">

<h5>Informações pessoais</h5>

<input class="form-control mb-2" id="name" placeholder="Nome completo">

<input class="form-control mb-2" id="title" placeholder="Cargo">

<input class="form-control mb-2" id="email" placeholder="Email">

<input class="form-control mb-2" id="phone" placeholder="Telefone">

<input class="form-control mb-2" id="city" placeholder="Cidade">

<input class="form-control mb-2" id="linkedin" placeholder="LinkedIn">

</div>

<div class="section">

<h5>Resumo profissional</h5>

<textarea class="form-control" id="summary"></textarea>

</div>

<div class="section">

<h5>Experiência profissional</h5>

<div id="experienceContainer"></div>

<button class="btn btn-sm btn-secondary" onclick="addExperience()">
Adicionar experiência
</button>

</div>

<div class="section">

<h5>Formação acadêmica</h5>

<div id="educationContainer"></div>

<button class="btn btn-sm btn-secondary" onclick="addEducation()">
Adicionar formação
</button>

</div>

<div class="section">

<h5>Certificações</h5>

<div id="certContainer"></div>

<button class="btn btn-sm btn-secondary" onclick="addCert()">
Adicionar certificação
</button>

</div>

<div class="section">

<button class="btn btn-primary w-100" onclick="generatePreview()">
Atualizar pré-visualização
</button>

<button class="btn btn-success w-100 mt-2" onclick="downloadPDF()">
Exportar PDF
</button>

</div>

</div>

<!-- PREVIEW -->

<div class="col-lg-6">

<h5 class="text-center">Pré-visualização</h5>

<div id="resumePreview">

<h2 id="p_name"></h2>
<h5 id="p_title"></h5>

<p id="p_contact"></p>

<div class="section-title">Resumo</div>
<p id="p_summary"></p>

<div class="section-title">Experiência</div>
<ul id="p_experience"></ul>

<div class="section-title">Formação</div>
<ul id="p_education"></ul>

<div class="section-title">Certificações</div>
<ul id="p_cert"></ul>

</div>

</div>

</div>

</div>

<script>

function addExperience(){

let html=`

<div class="card p-2 mb-2">

<input class="form-control mb-1 empresa" placeholder="Empresa">

<input class="form-control mb-1 cargo" placeholder="Cargo">

<input class="form-control periodo" placeholder="Período">

</div>

`

document.getElementById("experienceContainer").insertAdjacentHTML("beforeend",html)

}

function addEducation(){

let html=`

<div class="card p-2 mb-2">

<input class="form-control mb-1 faculdade" placeholder="Instituição">

<input class="form-control mb-1 curso" placeholder="Curso">

<input class="form-control periodo" placeholder="Período">

</div>

`

document.getElementById("educationContainer").insertAdjacentHTML("beforeend",html)

}

function addCert(){

let html=`<input class="form-control mb-2 certificacao" placeholder="Certificação">`

document.getElementById("certContainer").insertAdjacentHTML("beforeend",html)

}

function generatePreview(){

document.getElementById("p_name").innerText=document.getElementById("name").value
document.getElementById("p_title").innerText=document.getElementById("title").value

document.getElementById("p_summary").innerText=document.getElementById("summary").value

let contact = 
document.getElementById("email").value+" | "+
document.getElementById("phone").value+" | "+
document.getElementById("city").value+" | "+
document.getElementById("linkedin").value

document.getElementById("p_contact").innerText=contact

// EXPERIÊNCIAS

let expList=document.getElementById("p_experience")
expList.innerHTML=""

document.querySelectorAll("#experienceContainer .card").forEach(card=>{

let empresa=card.querySelector(".empresa").value
let cargo=card.querySelector(".cargo").value
let periodo=card.querySelector(".periodo").value

let li=document.createElement("li")

li.innerText=empresa+" — "+cargo+" ("+periodo+")"

expList.appendChild(li)

})

// EDUCAÇÃO

let eduList=document.getElementById("p_education")
eduList.innerHTML=""

document.querySelectorAll("#educationContainer .card").forEach(card=>{

let faculdade=card.querySelector(".faculdade").value
let curso=card.querySelector(".curso").value
let periodo=card.querySelector(".periodo").value

let li=document.createElement("li")

li.innerText=faculdade+" — "+curso+" ("+periodo+")"

eduList.appendChild(li)

})

// CERTIFICAÇÕES

let certList=document.getElementById("p_cert")
certList.innerHTML=""

document.querySelectorAll(".certificacao").forEach(c=>{

let li=document.createElement("li")
li.innerText=c.value
certList.appendChild(li)

})

}

async function downloadPDF(){

const { jsPDF } = window.jspdf

const element=document.getElementById("resumePreview")

const canvas=await html2canvas(element)

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF("p","mm","a4")

pdf.addImage(img,"PNG",0,0,210,297)

pdf.save("curriculo.pdf")

}

addExperience()
addEducation()
addCert()

</script>

</body>
</html>
